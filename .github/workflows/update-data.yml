name: Update stock data

on:
  schedule:
    # Every 15 min during US market hours (Mon-Fri 13:30-20:00 UTC = 9:30am-4pm ET)
    - cron: '*/15 13-20 * * 1-5'
    # Once at 6am UTC daily for overnight/pre-market snapshot
    - cron: '0 6 * * 1-5'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch latest stock data
        run: python update.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "Auto-update data $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
